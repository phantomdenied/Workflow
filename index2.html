<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testing Zone</title>

<style>

body{
    margin:0;
    padding:40px 20px;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#1f2937,#111827);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    max-width:90%;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.emoji{
    font-size:55px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
}

.message{
    margin:15px 0 25px 0;
    font-style:italic;
    opacity:0.9;
}

.terminal{
    background:#000;
    border-radius:8px;
    padding:15px;
    text-align:left;
    font-family:monospace;
    height:220px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.log{
    color:#00ff9c;
    font-size:14px;
    line-height:1.4;
}

.status{
    margin-top:20px;
    opacity:0.7;
    font-size:0.9em;
}

</style>
</head>

<body>

<div class="container">

<div class="emoji">🧪</div>
<h1>No Test Site Currently Available</h1>

<div class="message" id="devMessage"></div>

<div class="terminal">
<div id="terminalLogs"></div>
</div>

<div class="status">
System Status: Waiting for test environment...
</div>

</div>

<script>

const messages = [
"Developer is currently fighting a semicolon.",
"Have you tried turning the developer off and on again?",
"The test site escaped containment.",
"Someone pushed to production on a Friday.",
"Developer is googling the error message.",
"The bug became a feature.",
"Refactoring something that worked yesterday.",
"Deploying another 'quick fix'."
];

function newMessage(){
    const random = messages[Math.floor(Math.random()*messages.length)];
    document.getElementById("devMessage").textContent = "💬 " + random;
}

newMessage();

const logs = [
"[INFO] Booting test environment...",
"[INFO] Loading experimental modules...",
"[INFO] Initializing coffee.exe",
"[WARN] Developer missing semicolon",
"[INFO] Attempting automatic fix...",
"[ERROR] Fix created 3 new bugs",
"[INFO] Rolling back changes...",
"[INFO] Retrying deployment...",
"[WARN] Someone committed directly to main",
"[INFO] Searching StackOverflow...",
"[INFO] Installing 1,274 dependencies...",
"[INFO] Removing 1,273 unused dependencies...",
"[INFO] Starting local server...",
"[ERROR] Port already in use",
"[INFO] Negotiating with server hamster...",
"[INFO] Recompiling universe...",
"[SUCCESS] Almost ready... maybe"
];

const terminal = document.getElementById("terminalLogs");

function addLog(){
    const line = document.createElement("div");
    line.className = "log";

    const random = logs[Math.floor(Math.random()*logs.length)];

    line.textContent = "> " + random;

    terminal.appendChild(line);

    if(terminal.children.length > 14){
        terminal.removeChild(terminal.firstChild);
    }
}

setInterval(addLog, 1200);

</script>

</body>
</html>
