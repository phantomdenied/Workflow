<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nothing Here (Oops)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --yellow: #f5e642;
    --orange: #ff6b35;
    --pink: #ff2d78;
    --teal: #00f5d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--yellow);
    font-family: 'Syne Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 18px; height: 18px;
    background: var(--yellow);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    transition: transform 0.1s;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(245,230,66,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,230,66,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 10;
    padding: 2rem;
  }

  /* Big bouncing emoji */
  .hero-emoji {
    font-size: clamp(5rem, 15vw, 9rem);
    display: block;
    animation: floatBounce 2.4s ease-in-out infinite;
    filter: drop-shadow(0 0 30px var(--orange));
    margin-bottom: 1.5rem;
    position: relative;
  }
  .hero-emoji::after {
    content: attr(data-shadow);
    position: absolute;
    left: 50%;
    transform: translateX(-50%) scaleY(-0.4) translateY(10px);
    opacity: 0.2;
    filter: blur(3px);
  }

  @keyframes floatBounce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%       { transform: translateY(-28px) rotate(6deg); }
  }

  /* Main headline */
  h1 {
    font-family: 'Righteous', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: glitchShift 6s infinite;
    margin-bottom: 0.5rem;
  }

  @keyframes glitchShift {
    0%, 94%, 100% { transform: none; filter: none; }
    95% { transform: translate(-3px, 1px) skewX(-2deg); filter: hue-rotate(40deg); }
    96% { transform: translate(3px, -1px) skewX(1deg); filter: hue-rotate(-20deg); }
    97% { transform: translate(-2px, 2px); filter: none; }
  }

  /* Subtitle cycling messages */
  .subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: var(--teal);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    min-height: 1.5em;
  }

  .subtitle span {
    display: inline-block;
    animation: fadeMsg 0.4s ease both;
  }

  @keyframes fadeMsg {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Progress / fake loading bar */
  .loading-wrap {
    margin: 0 auto 2.5rem;
    width: min(420px, 90vw);
  }

  .loading-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(245,230,66,0.45);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }

  .bar-track {
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--teal), var(--yellow), var(--orange));
    animation: neverLoad 3.8s ease-in-out infinite;
    box-shadow: 0 0 10px var(--teal);
  }

  @keyframes neverLoad {
    0%   { width: 0%; margin-left: 0; }
    40%  { width: 75%; margin-left: 0; }
    60%  { width: 82%; margin-left: 0; }
    80%  { width: 88%; margin-left: 0; }
    99%  { width: 4%;  margin-left: 96%; }
    100% { width: 0%;  margin-left: 0; }
  }

  /* Floating debris particles */
  .particles {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .p {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { opacity: 0;   transform: translateY(100vh) rotate(0deg); }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { opacity: 0;   transform: translateY(-10vh) rotate(540deg); }
  }

  /* CTA button */
  .btn {
    display: inline-block;
    padding: 0.75rem 2.2rem;
    border: 2px solid var(--yellow);
    color: var(--yellow);
    font-family: 'Syne Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: color 0.25s;
    margin-top: 0.5rem;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--yellow);
    transform: translateX(-101%);
    transition: transform 0.25s cubic-bezier(.7,0,.3,1);
    z-index: -1;
  }
  .btn:hover { color: var(--bg); }
  .btn:hover::before { transform: translateX(0); }

  /* Tiny footer note */
  .note {
    position: fixed;
    bottom: 1.2rem;
    font-size: 0.65rem;
    color: rgba(245,230,66,0.2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: blink 3.5s step-end infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.3; }
    50%      { opacity: 0.05; }
  }

  /* ---- JUMPSCARE ---- */
  #blackout {
    display: none;
    position: fixed; inset: 0;
    z-index: 8999;
    background: #000;
  }
  #blackout.active { display: block; }
  #jumpscare {
    display: none;
    position: fixed; inset: 0;
    z-index: 9000;
    background: #ff0000;
    animation: scareFlash 0.08s step-end infinite;
    cursor: none;
  }
  #jumpscare.active { display: block; }
  #jumpscare .scare-content {
    position: fixed;
    bottom: 2.5rem;
    left: 0; right: 0;
    z-index: 9010;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  @keyframes scareFlash {
    0%   { background: #ff0000; }
    25%  { background: #ffffff; }
    50%  { background: #ff0000; }
    75%  { background: #000000; }
  }
  #scare-img {
    display: none;
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%) scale(6.9);
    transform-origin: 50% 0%;
    z-index: 9001;
    height: 480px;
    width: auto;
    filter: drop-shadow(0 0 40px #00ff88) brightness(1.3);
  }
  #jumpscare.active #scare-img {
    display: block;
    animation: scareZoom 0.18s cubic-bezier(0.5, 0, 1, 1) forwards;
  }
  #jumpscare.active #scare-img.shaking {
    animation: scareShakeBig 0.07s linear infinite;
  }
  @keyframes scareZoom {
    0%   { transform: translateX(-50%) scale(0.06); }
    100% { transform: translateX(-50%) scale(6.9);   }
  }
  @keyframes scareShakeBig {
    0%   { transform: translateX(calc(-50% - 22px)) scale(6.9) rotate(-4deg); }
    20%  { transform: translateX(calc(-50% + 25px)) scale(6.9) rotate( 5deg); }
    40%  { transform: translateX(calc(-50% - 18px)) scale(6.9) rotate(-6deg); }
    60%  { transform: translateX(calc(-50% + 20px)) scale(6.9) rotate( 4deg); }
    80%  { transform: translateX(calc(-50% - 24px)) scale(6.9) rotate(-5deg); }
    100% { transform: translateX(calc(-50% + 22px)) scale(6.9) rotate( 6deg); }
  }

  #jumpscare .scare-text {
    font-family: 'Righteous', cursive;
    font-size: clamp(2rem, 8vw, 5rem);
    color: #fff;
    text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
    letter-spacing: 0.1em;
    animation: scareShake 0.05s linear infinite;
    margin-top: 1rem;
  }
  #jumpscare .scare-sub {
    font-family: 'Syne Mono', monospace;
    font-size: clamp(0.8rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.7);
    margin-top: 0.75rem;
    letter-spacing: 0.15em;
  }
  #jumpscare .dismiss {
    margin-top: 2rem;
    padding: 0.6rem 1.8rem;
    border: 2px solid white;
    color: white;
    background: transparent;
    font-family: 'Syne Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    animation: none;
  }
  @keyframes scareShake {
    0%   { transform: translate(-4px,  3px) rotate(-2deg); }
    25%  { transform: translate( 4px, -3px) rotate( 2deg); }
    50%  { transform: translate(-3px, -4px) rotate(-1deg); }
    75%  { transform: translate( 3px,  4px) rotate( 1deg); }
    100% { transform: translate(-4px,  3px) rotate(-2deg); }
  }

  /* ---- KONAMI EASTER EGG ---- */
  #konami-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 8000;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  #konami-overlay.active { display: flex; }
  #konami-overlay .k-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(2rem, 7vw, 4.5rem);
    background: linear-gradient(135deg, var(--teal), var(--yellow), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: kPulse 1s ease-in-out infinite alternate;
  }
  @keyframes kPulse {
    from { letter-spacing: 0.05em; }
    to   { letter-spacing: 0.3em;  }
  }
  #konami-overlay .k-msg {
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: var(--teal);
    letter-spacing: 0.15em;
    text-align: center;
    padding: 0 1rem;
  }
  #konami-overlay .k-secret {
    font-size: clamp(3rem, 10vw, 6rem);
    animation: spin 2s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  #konami-overlay .dismiss {
    padding: 0.6rem 1.8rem;
    border: 2px solid var(--yellow);
    color: var(--yellow);
    background: transparent;
    font-family: 'Syne Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    margin-top: 1rem;
  }

  /* ---- WARNING TIMER ---- */
  #warn {
    position: fixed;
    top: 1.2rem;
    right: 1.4rem;
    font-size: 0.65rem;
    color: rgba(255,45,120,0);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 1s;
    z-index: 200;
  }
  #warn.visible { color: rgba(255,45,120,0.6); }
  #warn.urgent  { color: var(--pink); animation: blink 0.5s step-end infinite; }
  #click-warn {
    position: fixed;
    top: 1.2rem;
    left: 1.4rem;
    font-size: 0.65rem;
    color: rgba(255,107,53,0);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.6s;
    z-index: 200;
  }
  #click-warn.visible { color: rgba(255,107,53,0.6); }
  #click-warn.urgent  { color: var(--orange); animation: blink 0.5s step-end infinite; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="particles" id="particles"></div>

<div class="container">
  <span class="hero-emoji" data-shadow="🚧">🚧</span>

  <h1>PAGE NOT&nbsp;FOUND</h1>

  <p class="subtitle"><span id="msg">Searching down the back of the sofa…</span></p>

  <div class="loading-wrap">

      <span>LOCATING PAGE</span>
      <span id="pct">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <a class="btn" id="randomBtn" href="#">← Go Somewhere Real</a>
</div>

<p class="note">[ test page is vibing elsewhere right now ]</p>
<div id="warn"></div>
<div id="click-warn"></div>

  const emojis = ['✨','🐛','💾','🎲','🔧','🥴','🤖','⚡','🧩','🪲','📡','🌀','🎯'];
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (0.9 + Math.random() * 1.4) + 'rem';
    pContainer.appendChild(p);
  }

  // Emoji roulette on click
  const heroEmoji = document.querySelector('.hero-emoji');
  const emojiPool = ['🚧','😵','🫠','🤡','👻','💀','🧟','🤷','🫣','🪄','🥹','🫡'];
  document.addEventListener('click', () => {
    heroEmoji.textContent = emojiPool[Math.floor(Math.random() * emojiPool.length)];
  });

  // ── RANDOM REDIRECT ──────────────────────────────────────────────
  const randomSites = [
    'https://en.wikipedia.org/wiki/Special:Random',
    'https://www.boredpanda.com',
    'https://neal.fun',
    'https://theuselessweb.com',
    'https://randomstreetview.com',
    'https://radio.garden',
    'https://earth.nullschool.net',
    'https://www.windowswap.com',
    'https://www.mapcrunch.com',
    'https://weirdorconfusing.com',
    'https://pointerpointer.com',
    'https://cat-bounce.com',
    'https://www.omfgdogs.com',
    'https://hackertyper.net',
  ];
  document.getElementById('randomBtn').addEventListener('click', e => {
    e.preventDefault();
    const url = randomSites[Math.floor(Math.random() * randomSites.length)];
    window.open(url, '_blank');
  });

  // ── AUDIO: unlock on first interaction ───────────────────────────
  let audioCtx = null;
  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new AudioContext();
      // play a silent buffer to unlock
      const buf = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
    }
    document.removeEventListener('mousemove', unlockAudio);
    document.removeEventListener('click', unlockAudio);
  }
  document.addEventListener('mousemove', unlockAudio);
  document.addEventListener('click', unlockAudio);

  function playScareSound() {
    try {
      const ctx = audioCtx || new AudioContext();
      // low rumble
      const rumble = ctx.createOscillator();
      const rumbleGain = ctx.createGain();
      rumble.type = 'sawtooth';
      rumble.frequency.setValueAtTime(60, ctx.currentTime);
      rumble.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 1.5);
      rumbleGain.gain.setValueAtTime(0.5, ctx.currentTime);
      rumbleGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
      rumble.connect(rumbleGain); rumbleGain.connect(ctx.destination);
      rumble.start(); rumble.stop(ctx.currentTime + 1.5);
      // high screech
      const screech = ctx.createOscillator();
      const screechGain = ctx.createGain();
      screech.type = 'sawtooth';
      screech.frequency.setValueAtTime(1200, ctx.currentTime);
      screech.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.8);
      screechGain.gain.setValueAtTime(0.35, ctx.currentTime);
      screechGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      screech.connect(screechGain); screechGain.connect(ctx.destination);
      screech.start(); screech.stop(ctx.currentTime + 0.8);
    } catch(e) {}
  }

  function triggerJumpscare() {
    clearInterval(timerTick);
    warn.className = '';
    warn.textContent = '';
    // black screen for 1500ms first
    const blackout = document.getElementById('blackout');
    blackout.classList.add('active');
    setTimeout(() => {
      blackout.classList.remove('active');
      const img = document.getElementById('scare-img');
      img.classList.remove('shaking');
      img.style.animation = 'none';
      img.offsetHeight;
      img.style.animation = '';
      jumpscare.classList.add('active');
      playScareSound();
      setTimeout(() => {
        img.classList.add('shaking');
      }, 200);
    }, 1500);
  }

  // ── JUMPSCARE (30 seconds) ────────────────────────────────────────
  const warn = document.getElementById('warn');
  const jumpscare = document.getElementById('jumpscare');
  const START = Date.now();
  const SCARE_AT = 30000;
  const WARN_AT  = 18000;
  let timerTick;

  timerTick = setInterval(() => {
    const elapsed = Date.now() - START;
    const remaining = Math.ceil((SCARE_AT - elapsed) / 1000);

    if (elapsed >= SCARE_AT) {
      triggerJumpscare();
    } else if (elapsed >= WARN_AT) {
      warn.className = 'urgent';
      warn.textContent = `⚠ something is coming in ${remaining}s`;
    } else if (elapsed >= WARN_AT - 5000) {
      warn.className = 'visible';
      warn.textContent = `you've been here a while…`;
    }
  }, 1500);

  // ── 10-CLICK JUMPSCARE TRIGGER ────────────────────────────────────
  let clickCount = 0;
  let scareTriggered = false;
  const clickWarn = document.getElementById('click-warn');
  const clickMsgs = {
    5:  { text: "i wouldn't keep doing that…",    cls: 'visible' },
    6:  { text: "seriously. stop.",                cls: 'visible' },
    7:  { text: "you were warned.",                cls: 'urgent'  },
    8:  { text: "last chance.",                    cls: 'urgent'  },
    9:  { text: "ok you asked for it.",            cls: 'urgent'  },
  };
  document.addEventListener('click', () => {
    if (scareTriggered) return;
    clickCount++;
    if (clickMsgs[clickCount]) {
      clickWarn.textContent = clickMsgs[clickCount].text;
      clickWarn.className = clickMsgs[clickCount].cls;
    }
    if (clickCount >= 10) {
      scareTriggered = true;
      clickWarn.textContent = '';
      clickWarn.className = '';
      triggerJumpscare();
    }
  });

  // ── KONAMI CODE EASTER EGG ────────────────────────────────────────
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown',
                  'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let ki = 0;
  document.addEventListener('keydown', e => {
    if (e.key === KONAMI[ki]) {
      ki++;
      if (ki === KONAMI.length) {
        ki = 0;
        document.getElementById('konami-overlay').classList.add('active');
      }
    } else {
      ki = 0;
    }
  });
</script>
</body>
</html>
